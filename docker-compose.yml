services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragcrawler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragcrawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - ragcrawler_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragcrawler} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for session storage and job queue
  redis:
    image: redis:7-alpine
    container_name: ragcrawler-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ragcrawler_redis:/data
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (FastAPI + Playwright)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragcrawler-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ragcrawler}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ragdb}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      HEADLESS: "true"
    volumes:
      - ragcrawler_uploads:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 3

  # RQ Worker — processes background jobs (file indexing, URL crawling)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragcrawler-worker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ragcrawler_uploads:/tmp/uploads
    command: ["sh", "-c", "python -m rq.cli worker --url \"$$REDIS_URL\" default"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ragcrawler}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ragdb}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      HEADLESS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from rq import Worker; from redis import Redis; r=Redis.from_url(os.environ['REDIS_URL']); assert len(Worker.all(connection=r)) > 0\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # Frontend (Next.js) — exposed via Traefik
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/backend
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://ragcrawler.pgdev.com.br}
        BACKEND_INTERNAL_URL: http://ragcrawler-backend:8000
    container_name: ragcrawler-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://ragcrawler-backend:8000
      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://ragcrawler.pgdev.com.br}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://ragcrawler.pgdev.com.br}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ragcrawler}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ragdb}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ragcrawler.entrypoints=https"
      - "traefik.http.routers.ragcrawler.rule=Host(`ragcrawler.pgdev.com.br`)"
      - "traefik.http.routers.ragcrawler.tls=true"
      - "traefik.http.routers.ragcrawler.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ragcrawler.middlewares=ragcrawler-security@docker,global-ratelimit@file,strip-server-header@file"
      - "traefik.http.services.ragcrawler.loadbalancer.server.port=3000"
      # Security Headers
      - "traefik.http.middlewares.ragcrawler-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.ragcrawler-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.ragcrawler-security.headers.stsPreload=true"
      - "traefik.http.middlewares.ragcrawler-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.ragcrawler-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.ragcrawler-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.ragcrawler-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.ragcrawler-security.headers.frameDeny=true"

networks:
  proxy:
    external: true
  internal:
    driver: bridge

volumes:
  ragcrawler_pgdata:
    driver: local
  ragcrawler_redis:
    driver: local
  ragcrawler_uploads:
    driver: local
